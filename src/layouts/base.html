<!DOCTYPE html>
<html lang="{{ __lang_html }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ meta.title }}</title>
  <meta name="description" content="{{ meta.description }}" />
  <meta name="theme-color" content="#FAF8F3" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="{{ app.name }}" />
  <meta property="og:title" content="{{ meta.title }}" />
  <meta property="og:description" content="{{ meta.description }}" />
  <meta property="og:url" content="{{ __canonical }}" />
  <meta property="og:image" content="https://today.sb-corporation.com/assets/images/icon-1024.png" />
  <meta name="twitter:card" content="summary" />
  <link rel="canonical" href="{{ __canonical }}" />
  {{ __hreflangs }}
  <link rel="icon" type="image/png" href="/assets/images/icon-1024.png" />
  <link rel="apple-touch-icon" href="/assets/images/icon-1024.png" />
  <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/NotoSerifKR-Regular.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/NotoSerifKR-SemiBold.woff2" crossorigin />
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body data-page="{{ __page }}" data-locale="{{ __locale }}">
  {{ __header }}
  <main>
    {{ __content }}
  </main>
  {{ __footer }}
</body>
</html>
